{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - {{ login_texts.title }}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="{% static 'css/all.min.css' %}" rel="stylesheet">
    <!-- Theme Styles -->
    <link href="{% static theme_config.theme_css %}" rel="stylesheet" id="theme-style">
    <!-- Animation Styles -->
    <link href="{% static theme_config.anim_css %}" rel="stylesheet" id="anim-style">
    <style>
        :root {
            --sidebar-width: 260px;
            --header-height: 70px;
        }
        
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Global Glass Card Style */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border-radius: 15px;
        }

        /* Animated Background Canvas & Grid Overlay - Handled by Theme CSS */


        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 30px rgba(0, 0, 0, 0.2);
        }

        .sidebar-header {
            height: var(--header-height);
            display: flex;
            align-items: center;
            padding: 0 25px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(90deg, rgba(128, 128, 128, 0.1), transparent);
        }

        .sidebar-header h1 {
            font-size: 1.1rem;
            margin: 0;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        .logo-icon {
            margin-right: 15px;
            color: var(--primary-color);
            font-size: 1.5rem;
            filter: drop-shadow(0 0 5px var(--primary-color));
        }

        .sidebar-menu {
            padding: 20px 15px;
            flex-grow: 1;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--text-color);
            opacity: 0.8;
            text-decoration: none;
            transition: all 0.3s;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid transparent;
        }

        .menu-item:hover {
            background: rgba(128, 128, 128, 0.1);
            color: var(--primary-color);
            transform: translateX(5px);
            border-color: var(--border-color);
            opacity: 1;
        }

        .menu-item.active {
            background: linear-gradient(90deg, rgba(0, 255, 136, 0.15), rgba(0, 210, 255, 0.05));
            color: var(--primary-color);
            border: 1px solid rgba(0, 255, 136, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.1);
        }

        .menu-item i {
            width: 25px;
            margin-right: 15px;
            text-align: center;
            font-size: 1.1rem;
        }

        /* Main Content Styles */
        .main-content {
            margin-left: var(--sidebar-width);
            transition: all 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            /* z-index: 1; Removed to fix Modal backdrop issue */
        }

        .top-navbar {
            height: var(--header-height);
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .content-wrapper {
            padding: 30px;
            flex-grow: 1;
        }

        /* Common Components Override */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem;
        }
        
        .card-title {
            color: #fff;
            margin: 0;
            font-weight: 600;
        }

        .table {
            color: var(--text-color);
            border-color: var(--border-color);
        }

        .table > :not(caption) > * > * {
            background-color: transparent;
            border-bottom-color: var(--border-color);
            color: var(--text-color);
        }

        .table thead th {
            border-bottom: 2px solid var(--primary-color);
            color: var(--primary-color);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .form-control {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
        }

        .form-control:focus {
            background: var(--card-bg);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(0, 255, 136, 0.1);
            color: var(--text-color);
        }

        .btn-primary {
            background: linear-gradient(90deg, var(--primary-color), #00d2ff);
            border: none;
            color: #000;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: linear-gradient(90deg, #00d2ff, var(--primary-color));
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            color: #000;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                margin-left: calc(-1 * var(--sidebar-width));
            }
            
            .sidebar.show {
                margin-left: 0;
            }
            
            .main-content {
                margin-left: 0;
            }
            
            .overlay {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.7);
                backdrop-filter: blur(5px);
                z-index: 999;
            }
            
            .overlay.show {
                display: block;
            }
        }

        /* Animations */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-tech {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-tech:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.3);
        }

        /* Global Modal Styles */
        .modal-content {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.1);
        }

        .modal-header {
            border-bottom: 1px solid var(--border-color);
        }

        .modal-footer {
            border-top: 1px solid var(--border-color);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        /* Badges */
        .badge {
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .badge.bg-danger {
            background: rgba(220, 53, 69, 0.2) !important;
            color: #ff6b6b;
            border: 1px solid rgba(220, 53, 69, 0.3);
        }
        
        .badge.bg-info {
            background: rgba(13, 202, 240, 0.2) !important;
            color: #0dcaf0;
            border: 1px solid rgba(13, 202, 240, 0.3);
        }
        
        .badge.bg-success {
            background: rgba(25, 135, 84, 0.2) !important;
            color: #20c997;
            border: 1px solid rgba(25, 135, 84, 0.3);
        }
        
        .badge.bg-secondary {
            background: rgba(108, 117, 125, 0.2) !important;
            color: #adb5bd;
            border: 1px solid rgba(108, 117, 125, 0.3);
        }
    </style>
</head>
<body>
    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>
    
    <!-- Grid Overlay -->
    <div class="grid-overlay"></div>

    <!-- Mobile Overlay -->
    <div class="overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-robot logo-icon"></i>
            <h1>智能识别终端</h1>
        </div>
        
        <nav class="sidebar-menu">
            <a href="{% url 'user_management' %}" class="menu-item {% if '/users/' in request.path %}active{% endif %}">
                <i class="fas fa-users-cog"></i>
                <span>用户管理</span>
            </a>
            <a href="{% url 'detection_records' %}" class="menu-item {% if '/records/' in request.path %}active{% endif %}">
                <i class="fas fa-clipboard-check"></i>
                <span>识别记录</span>
            </a>
            <!-- <a href="{% url 'knowledge_list' %}" class="menu-item {% if '/knowledge_list/' in request.path %}active{% endif %}">
                <i class="fas fa-book-medical"></i>
                <span>知识库管理</span>
            </a> -->
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <button class="btn btn-link text-light d-md-none" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            
            <div class="ms-auto dropdown">
                <button class="btn btn-light text-success btn-sm rounded-pill px-3 dropdown-toggle d-flex align-items-center gap-2" type="button" id="adminDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    {% if request.user.avatar %}
                        <img src="{{ request.user.avatar.url }}" class="rounded-circle" width="24" height="24" style="object-fit: cover;">
                    {% else %}
                        <i class="fas fa-user me-1"></i>
                    {% endif %}
                    {{ request.user.username }}
                </button>
                <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="adminDropdown">
                    <li><a class="dropdown-item text-danger" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt me-2"></i>退出登录</a></li>
                </ul>
            </div>
        </header>

        <!-- Page Content -->
        <main class="content-wrapper">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            {% block content %}
            {% endblock %}
        </main>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>

    <!-- Particle Animation Script -->
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        // Configuration
        const particleCount = 40; // Reduced count for dashboard
        const connectionDistance = 150;
        const moveSpeed = 0.3; // Slower speed

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * moveSpeed;
                this.vy = (Math.random() - 0.5) * moveSpeed;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? '#00ff88' : '#00d2ff';
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off edges
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 255, 255, ${0.05 * (1 - distance / connectionDistance)})`; // Very faint white lines
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            particles = [];
            init();
        });

        init();
        animate();
    </script>
</body>
    
    <script>
        // Mobile Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const toggleBtn = document.getElementById('sidebarToggle');
        
        if(toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                sidebar.classList.toggle('show');
                overlay.classList.toggle('show');
            });
        }
        
        if(overlay) {
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('show');
                overlay.classList.remove('show');
            });
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
