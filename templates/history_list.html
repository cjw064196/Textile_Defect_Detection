{% for record in history %}
<a href="#" class="history-item d-flex gap-3 py-3 align-items-center text-decoration-none border-bottom border-secondary" onclick="viewHistoryItem('{{ record.image_result_path }}', '{{ record.id }}', '{{ record.image_url }}'); return false;">
    <div class="position-relative">
        {% if ".mp4" in record.image_result_path or ".webm" in record.image_result_path %}
        <img src="{{ record.image_url }}" alt="Video Thumbnail" class="rounded-3 flex-shrink-0 object-fit-cover border border-secondary" width="60" height="60" style="background-color: rgba(255,255,255,0.05);">
        <div class="overlay-icon">
            <i class="fas fa-play-circle fa-lg text-primary"></i>
        </div>
        {% else %}
        <img src="{{ record.image_result_path }}" alt="Result" class="rounded-3 flex-shrink-0 object-fit-cover border border-secondary" width="60" height="60" style="background-color: rgba(255,255,255,0.05);">
        <div class="overlay-icon">
            <i class="fas fa-search-plus"></i>
        </div>
        {% endif %}
    </div>
    <div class="d-flex flex-column justify-content-center w-100 overflow-hidden">
        <div class="d-flex justify-content-between align-items-center mb-1">
            <h6 class="mb-0 fw-bold text-truncate">检测记录 #{{ record.id }}</h6>
        </div>
        <small style="opacity: 0.8;"><i class="far fa-clock me-1 text-primary"></i>{{ record.detection_time }}</small>
    </div>
</a>
{% empty %}
<div class="text-center py-5 text-muted">
    <div class="empty-state-icon mb-3">
        <i class="fas fa-history fa-2x opacity-50"></i>
    </div>
    <p class="mb-0 small">暂无历史记录</p>
</div>
{% endfor %}

<style>
    .border-custom {
        border-color: var(--border-color) !important;
    }

    .history-item {
        transition: all 0.3s ease;
        padding-left: 10px;
        padding-right: 10px;
        border-radius: 8px;
    }

    .history-item:hover {
        background: rgba(128, 128, 128, 0.1);
        transform: translateX(5px);
    }

    .history-item img {
        transition: all 0.3s ease;
    }

    .history-item:hover img {
        border-color: var(--primary-color) !important;
        box-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
    }

    .overlay-icon {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s ease;
        border-radius: 0.3rem; /* match rounded-3 */
        color: var(--primary-color);
    }

    .history-item:hover .overlay-icon {
        opacity: 1;
    }
</style>
