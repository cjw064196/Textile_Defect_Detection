{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录 - 智能识别平台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="{% static 'css/all.min.css' %}" rel="stylesheet">
    <!-- Base Styles -->
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    <!-- Theme Styles -->
    <link href="{% static theme_config.theme_css %}" rel="stylesheet" id="theme-style">
    <!-- Animation Styles -->
    <link href="{% static theme_config.anim_css %}" rel="stylesheet" id="anim-style">
</head>
<body class="auth-body">
    <!-- Background Canvas -->
    <canvas id="bg-canvas"></canvas>
    
    <!-- Grid Overlay -->
    <div class="grid-overlay"></div>

    <div class="container login-container">
        <!-- Scan Line Effect -->
        <div class="scan-overlay d-block"></div>
        
        <div class="auth-card">
            <div class="auth-card-header">
                <div class="logo-container">
                    <div class="logo-circle"></div>
                    <i class="fas fa-robot logo-icon"></i>
                </div>
                <h4 class="title-text">{{ login_texts.title }}</h4>
                <p class="subtitle-text">INTELLIGENT IDENTIFICATION PLATFORM</p>
            </div>
            <div class="auth-card-body">
                <form action="{% url 'login' %}" method="post">
                    {% csrf_token %}
                    
                    {% if error %}
                    <div class="alert alert-custom alert-dismissible fade show mb-4" role="alert">
                        <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endif %}
                    
                    <div class="form-floating form-floating-auth">
                        <input type="text" class="form-control" id="username" name="username" placeholder="用户名" required autocomplete="off">
                        <label for="username"><i class="fas fa-user me-2"></i>ACCESS ID</label>
                    </div>
                    
                    <div class="form-floating form-floating-auth">
                        <input type="password" class="form-control" id="password" name="password" placeholder="密码" required>
                        <label for="password"><i class="fas fa-lock me-2"></i>PASSWORD</label>
                    </div>
                    
                    <button type="submit" class="btn btn-auth btn-primary">
                        <i class="fas fa-sign-in-alt me-2"></i> 立即登录
                    </button>
                    
                    <div class="links">
                        <a href="{% url 'register' %}">注册新账号</a>
                       
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    
    <!-- Particle Animation Script -->
    <script>
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let width, height;
        let particles = [];
        
        // Get theme colors
        const style = getComputedStyle(document.body);
        const primaryColor = style.getPropertyValue('--primary-color').trim();
        const secondaryColor = style.getPropertyValue('--secondary-color').trim();
        const textColor = style.getPropertyValue('--text-color').trim();
        
        // Configuration
        const particleCount = 60;
        const connectionDistance = 150;
        const moveSpeed = 0.5;

        function hexToRgba(hex, alpha) {
            let r = 0, g = 0, b = 0;
            if (hex.length === 4) {
                r = parseInt(hex[1] + hex[1], 16);
                g = parseInt(hex[2] + hex[2], 16);
                b = parseInt(hex[3] + hex[3], 16);
            } else if (hex.length === 7) {
                r = parseInt(hex.substring(1, 3), 16);
                g = parseInt(hex.substring(3, 5), 16);
                b = parseInt(hex.substring(5, 7), 16);
            }
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * moveSpeed;
                this.vy = (Math.random() - 0.5) * moveSpeed;
                this.size = Math.random() * 2 + 1;
                this.color = Math.random() > 0.5 ? primaryColor : secondaryColor;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                // Bounce off edges
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function init() {
            resize();
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw connections
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < connectionDistance) {
                        ctx.beginPath();
                        ctx.strokeStyle = hexToRgba(primaryColor, 1 - distance / connectionDistance);
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }

            // Update and draw particles
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            particles = [];
            init();
        });

        init();
        animate();
    </script>
</body>
</html>
